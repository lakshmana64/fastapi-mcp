name: Bug Report
description: Report a reproducible defect
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.11.x"
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: fastapi-mcp Version
      placeholder: "0.x.x"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Traceback / Logs
      render: shell
